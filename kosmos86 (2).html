<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOSMOS-86: Emergencia Atompunk</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Oswald:wght@300;400;700&display=swap');

  :root {
    --green: #00ff41;
    --green-dim: #00a829;
    --green-dark: #003d0f;
    --amber: #ffb300;
    --red: #ff1a1a;
    --red-dim: #7a0000;
    --bg: #020a03;
    --scanline: rgba(0,0,0,0.15);
    --glow: 0 0 10px #00ff41, 0 0 20px #00ff4155, 0 0 40px #00ff4122;
    --glow-red: 0 0 10px #ff1a1a, 0 0 20px #ff1a1a88;
    --glow-amber: 0 0 8px #ffb300, 0 0 16px #ffb30066;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh; /* Altura estricta */
    overflow: hidden; /* Evita el scroll global de la página */
    cursor: default;
  }

  /* Scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      var(--scanline) 0px,
      var(--scanline) 1px,
      transparent 1px,
      transparent 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* CRT vignette */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.85) 100%);
    pointer-events: none;
    z-index: 9998;
  }

  /* CONTENEDOR PRINCIPAL FLEXIBLE */
  #app {
    max-width: 900px;
    margin: 0 auto;
    padding: 2vh 20px; /* Padding vertical ajustado por viewport */
    height: 100vh;
    display: flex;
    flex-direction: column;
    gap: 10px; /* Separación uniforme sin necesidad de margins inferiores */
  }

  /* Header */
  .crt-header {
    text-align: center;
    border: 2px solid var(--green-dim);
    border-top: 4px solid var(--green);
    padding: 10px;
    position: relative;
    background: linear-gradient(180deg, #001a05 0%, var(--bg) 100%);
    box-shadow: var(--glow), inset 0 0 30px rgba(0,255,65,0.05);
    flex-shrink: 0; /* Impide que el header se aplaste */
  }

  .crt-header::before {
    content: '◄ К-86 TERMINAL ГЛАВНОГО УПРАВЛЕНИЯ ►';
    display: block;
    font-size: 10px;
    color: var(--green-dim);
    letter-spacing: 3px;
    margin-bottom: 4px;
  }

  .title-main {
    font-family: 'VT323', monospace;
    font-size: clamp(28px, 5vw, 54px);
    color: var(--green);
    text-shadow: var(--glow);
    letter-spacing: 4px;
    line-height: 1;
    animation: flicker 8s infinite;
  }

  .title-sub {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(10px, 1.5vw, 14px);
    color: var(--amber);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 4px;
    text-shadow: var(--glow-amber);
  }

  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96% { opacity: 0.7; }
    97% { opacity: 1; }
    98% { opacity: 0.5; }
    99% { opacity: 1; }
  }

  /* HUD */
  .hud {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    flex-shrink: 0;
  }

  .hud-panel {
    border: 1px solid var(--green-dim);
    padding: 8px 12px;
    background: rgba(0,40,10,0.3);
    position: relative;
  }

  .hud-label {
    font-size: 10px;
    color: var(--green-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .hud-value {
    font-family: 'VT323', monospace;
    font-size: 24px;
    color: var(--green);
    text-shadow: var(--glow);
  }

  .hud-value.danger { color: var(--red); text-shadow: var(--glow-red); animation: blink 0.5s infinite; }
  .hud-value.warning { color: var(--amber); text-shadow: var(--glow-amber); }

  .progress-bar {
    height: 6px;
    background: var(--green-dark);
    margin-top: 4px;
    border: 1px solid var(--green-dim);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--green);
    transition: width 0.5s ease, background 0.3s;
    box-shadow: var(--glow);
  }

  .progress-fill.rad { background: var(--red); box-shadow: var(--glow-red); }
  .progress-fill.pressure-high { background: var(--amber); box-shadow: var(--glow-amber); }

  /* Inventory */
  .inventory-panel {
    border: 1px solid var(--green-dim);
    padding: 6px 12px;
    background: rgba(0,40,10,0.2);
    min-height: 32px;
    flex-shrink: 0;
  }

  .inventory-label {
    font-size: 10px;
    color: var(--green-dim);
    letter-spacing: 2px;
    display: inline-block;
    margin-right: 10px;
  }

  .inv-item {
    display: inline-block;
    background: rgba(0,255,65,0.1);
    border: 1px solid var(--green-dim);
    padding: 2px 8px;
    margin: 2px;
    font-size: 11px;
    color: var(--amber);
  }

  /* Main terminal - ÁREA CON SCROLL INTERNO */
  .terminal {
    flex: 1 1 0; /* Ocupa el espacio restante dinámicamente */
    min-height: 0; /* Permite que el flex child colapse y active el scroll */
    overflow-y: auto; /* Activa el scroll vertical interno */
    border: 2px solid var(--green-dim);
    border-bottom: 4px solid var(--green);
    background: rgba(0,15,5,0.8);
    padding: 16px 24px;
    position: relative;
    box-shadow: inset 0 0 60px rgba(0,255,65,0.03);
  }

  /* Scrollbar personalizado estilo Atompunk */
  .terminal::-webkit-scrollbar {
    width: 12px;
  }
  .terminal::-webkit-scrollbar-track {
    background: rgba(0, 20, 5, 0.8);
    border-left: 1px solid var(--green-dark);
  }
  .terminal::-webkit-scrollbar-thumb {
    background: var(--green-dim);
    border: 1px solid var(--green);
  }
  .terminal::-webkit-scrollbar-thumb:hover {
    background: var(--green);
  }

  .terminal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    animation: scan 4s linear infinite;
    pointer-events: none;
  }

  @keyframes scan {
    0% { top: 0; opacity: 0.5; }
    100% { top: 100%; opacity: 0; }
  }

  .terminal-text {
    line-height: 1.6;
    font-size: clamp(13px, 1.5vw, 15px);
    white-space: pre-wrap;
  }

  .terminal-text .prompt {
    color: var(--green-dim);
  }

  .alert-line {
    color: var(--red);
    text-shadow: var(--glow-red);
    font-weight: bold;
    animation: blink 1s infinite;
  }

  .amber-line {
    color: var(--amber);
    text-shadow: var(--glow-amber);
  }

  .dim-line {
    color: var(--green-dim);
    font-size: 12px;
  }

  .bold-line {
    color: #80ffaa;
    text-shadow: 0 0 8px #80ffaa88;
  }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Choices */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
    max-height: 35vh; /* Previene que los botones expulsen contenido en móviles */
    overflow-y: auto;
  }
  
  .choices::-webkit-scrollbar { width: 6px; }
  .choices::-webkit-scrollbar-thumb { background: var(--green-dark); }

  .choice-btn {
    background: rgba(0,255,65,0.05);
    border: 1px solid var(--green-dim);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 10px 14px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .choice-btn::before {
    content: '▶ ';
    color: var(--green-dim);
  }

  .choice-btn:hover {
    background: rgba(0,255,65,0.15);
    border-color: var(--green);
    box-shadow: var(--glow);
    color: #fff;
  }

  .choice-btn:active { transform: translateX(2px); }

  .choice-btn.char-btn {
    border-color: var(--amber);
    color: var(--amber);
    padding: 12px 16px;
  }

  .choice-btn.char-btn:hover {
    background: rgba(255,179,0,0.1);
    border-color: var(--amber);
    box-shadow: var(--glow-amber);
    color: #fff;
  }

  .char-name {
    font-family: 'VT323', monospace;
    font-size: 20px;
    display: block;
    color: var(--green);
    margin-bottom: 2px;
  }

  .char-btn:hover .char-name { color: #fff; }

  .char-role {
    font-size: 11px;
    color: var(--amber);
    letter-spacing: 1px;
    display: block;
    margin-bottom: 2px;
  }

  .char-ability {
    font-size: 12px;
    color: var(--green-dim);
  }

  /* Input */
  .input-row {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    display: none;
  }

  .input-row.visible { display: flex; }

  .crt-input {
    flex: 1;
    background: rgba(0,40,10,0.5);
    border: 1px solid var(--green-dim);
    border-bottom: 2px solid var(--green);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    padding: 10px 14px;
    outline: none;
  }

  .crt-input:focus { border-color: var(--green); box-shadow: var(--glow); }

  .crt-input::placeholder { color: var(--green-dark); }

  .submit-btn {
    background: var(--green-dark);
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.15s;
    text-shadow: var(--glow);
  }

  .submit-btn:hover {
    background: rgba(0,255,65,0.2);
    box-shadow: var(--glow);
    color: #fff;
  }

  /* Attempts indicator */
  .attempts-indicator {
    display: none;
    font-size: 12px;
    color: var(--green-dim);
    letter-spacing: 1px;
    padding: 4px 10px;
    border: 1px solid var(--green-dark);
    flex-shrink: 0;
  }
  .attempts-indicator.visible { display: block; }
  .attempt-pip {
    display: inline-block;
    width: 14px; height: 14px;
    border: 1px solid var(--green-dim);
    margin-right: 4px;
    vertical-align: middle;
    background: var(--green-dark);
  }
  .attempt-pip.used {
    background: var(--red);
    border-color: var(--red);
    box-shadow: var(--glow-red);
  }

  /* Feedback */
  .feedback-panel {
    border: 1px solid;
    padding: 10px 14px;
    font-size: 13px;
    line-height: 1.5;
    flex-shrink: 0;
    display: none;
  }

  .feedback-panel.success {
    border-color: var(--green);
    background: rgba(0,255,65,0.06);
    color: #80ffaa;
    display: block;
  }

  .feedback-panel.error {
    border-color: var(--red);
    background: rgba(255,26,26,0.06);
    color: #ff8080;
    display: block;
    animation: shake 0.3s;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* Room title */
  .room-title {
    font-family: 'VT323', monospace;
    font-size: 28px;
    color: var(--amber);
    text-shadow: var(--glow-amber);
    letter-spacing: 3px;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--amber);
    padding-bottom: 6px;
  }

  /* Victory / Game Over */
  .big-message {
    font-family: 'VT323', monospace;
    font-size: clamp(32px, 6vw, 70px);
    text-align: center;
    padding: 20px;
    letter-spacing: 6px;
    animation: flicker 3s infinite;
  }

  .big-message.victory { color: var(--green); text-shadow: var(--glow); }
  .big-message.gameover { color: var(--red); text-shadow: var(--glow-red); }

  .restart-btn {
    display: block;
    margin: 10px auto;
    background: transparent;
    border: 2px solid var(--green);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    padding: 10px 24px;
    cursor: pointer;
    letter-spacing: 3px;
    text-shadow: var(--glow);
    box-shadow: var(--glow);
    transition: all 0.2s;
  }

  .restart-btn:hover {
    background: rgba(0,255,65,0.15);
    color: #fff;
  }

  /* Typewriter cursor */
  .cursor {
    display: inline-block;
    width: 10px;
    height: 16px;
    background: var(--green);
    animation: blink 0.7s infinite;
    vertical-align: middle;
    margin-left: 3px;
  }

  /* Loading overlay */
  #loading {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 99999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.8s;
  }

  #loading.hidden { opacity: 0; pointer-events: none; }

  .loading-logo {
    font-family: 'VT323', monospace;
    font-size: 80px;
    color: var(--green);
    text-shadow: var(--glow);
    letter-spacing: 8px;
    animation: flicker 2s infinite;
  }

  .loading-text {
    color: var(--green-dim);
    font-size: 13px;
    letter-spacing: 2px;
    margin-top: 20px;
  }

  .loading-bar-wrap {
    width: 300px;
    height: 4px;
    background: var(--green-dark);
    margin-top: 16px;
    border: 1px solid var(--green-dim);
  }

  .loading-bar-fill {
    height: 100%;
    background: var(--green);
    box-shadow: var(--glow);
    animation: load 2.5s ease-out forwards;
  }

  @keyframes load {
    from { width: 0%; }
    to { width: 100%; }
  }

  /* Science formula styling */
  .formula {
    background: rgba(0,255,65,0.08);
    border: 1px solid var(--green-dim);
    padding: 8px 16px;
    margin: 8px 0;
    color: #aaffcc;
    font-size: 14px;
    display: block;
  }

  /* Room indicator */
  .room-indicator {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .room-dot {
    width: 28px;
    height: 6px;
    background: var(--green-dark);
    border: 1px solid var(--green-dim);
    transition: background 0.4s;
  }

  .room-dot.done { background: var(--green); box-shadow: var(--glow); }
  .room-dot.active { background: var(--amber); box-shadow: var(--glow-amber); animation: blink 1.2s infinite; }

  /* character portrait box */
  .char-portrait {
    font-family: 'VT323', monospace;
    font-size: 11px;
    color: var(--green-dim);
    line-height: 1.2;
    display: block;
    margin-bottom: 6px;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loading-logo">К-86</div>
  <div class="loading-text">INICIANDO TERMINAL PRINCIPAL... KOSMOS-86 v4.1.1</div>
  <div class="loading-bar-wrap"><div class="loading-bar-fill"></div></div>
</div>

<div id="app">
  <div class="crt-header">
    <div class="title-main">KOSMOS-86</div>
    <div class="title-sub">⚠ Emergencia Atompunk ⚠</div>
  </div>

  <div class="hud" id="hud" style="display:none">
    <div class="hud-panel">
      <div class="hud-label">☢ RAD-METER</div>
      <div class="hud-value" id="rad-val">0 mSv</div>
      <div class="progress-bar"><div class="progress-fill" id="rad-bar" style="width:0%"></div></div>
    </div>
    <div class="hud-panel">
      <div class="hud-label">⚡ PRESIÓN DEL SISTEMA</div>
      <div class="hud-value" id="pres-val">50%</div>
      <div class="progress-bar"><div class="progress-fill" id="pres-bar" style="width:50%"></div></div>
    </div>
  </div>

  <div class="inventory-panel" id="inv-panel" style="display:none">
    <span class="inventory-label">■ INVENTARIO:</span>
    <span id="inv-items"><span style="color:var(--green-dark)">[ vacío ]</span></span>
  </div>

  <div class="room-indicator" id="room-dots" style="display:none">
    <div class="room-dot" id="dot-0"></div>
    <div class="room-dot" id="dot-1"></div>
    <div class="room-dot" id="dot-2"></div>
    <div class="room-dot" id="dot-3"></div>
  </div>

  <div id="char-display" style="display:none; color:var(--amber); font-size:13px; letter-spacing:1px; flex-shrink: 0;"></div>

  <div class="terminal">
    <div class="terminal-text" id="output"></div>
  </div>

  <div class="attempts-indicator" id="attempts-indicator">
    INTENTOS RESTANTES: <span id="attempt-pips"></span>
  </div>

  <div class="feedback-panel" id="feedback"></div>

  <div class="choices" id="choices"></div>

  <div class="input-row" id="input-row">
    <input type="text" class="crt-input" id="user-input" placeholder="Introduce tu respuesta..." autocomplete="off">
    <button class="submit-btn" id="submit-btn">ENVIAR</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// KOSMOS-86: EMERGENCIA ATOMPUNK
// Motor de juego principal
// ═══════════════════════════════════════════════

const STATE = {
  rad: 0,
  pressure: 50,
  inventory: [],
  character: null,
  room: 0,
  phase: 'intro',   // intro | charselect | room1 | room2 | room3 | room4 | victory | gameover
  attemptsRoom: 0,
  questionAttempts: 0,  // attempts on current individual question
  maxAttempts: 2,       // max attempts per question before showing solution
};

const CHARS = {
  volkov: {
    id: 'volkov',
    name: 'CAMARADA VOLKOV',
    role: 'Especialista en Núcleos — Rango: Mayor',
    ability: '☢ Reducción del daño por radiación un 20%. Sabe posicionarse ante fuentes emisoras.',
    portrait: [
      '  ┌──────┐',
      '  │ ◉  ◉│',
      '  │  ──  │',
      '  │ ████ │',
      '  └──────┘',
    ],
    radReduction: 0.8,
  },
  petrova: {
    id: 'petrova',
    name: 'CAMARADA PETROVA',
    role: 'Ingeniera de Fluidos — Rango: Capitán',
    ability: '⚙ Ve datos exactos de presión y temperatura en tuberías. La física de los fluidos no tiene secretos.',
    portrait: [
      '  ┌──────┐',
      '  │ ◈  ◈│',
      '  │  ~~  │',
      '  │ ████ │',
      '  └──────┘',
    ],
    radReduction: 1.0,
  },
  kamenev: {
    id: 'kamenev',
    name: 'CAMARADA KAMENEV',
    role: 'Mecánico de Automatismos — Rango: Teniente',
    ability: '⚙ Resuelve mejor los problemas de cinemática y fuerzas de los rovers soviéticos.',
    portrait: [
      '  ┌──────┐',
      '  │ ▣  ▣│',
      '  │  ▬▬  │',
      '  │ ████ │',
      '  └──────┘',
    ],
    radReduction: 1.0,
  },
};

// DOM refs
const output = document.getElementById('output');
const choices = document.getElementById('choices');
const feedback = document.getElementById('feedback');
const inputRow = document.getElementById('input-row');
const userInput = document.getElementById('user-input');
const submitBtn = document.getElementById('submit-btn');
const hud = document.getElementById('hud');
const invPanel = document.getElementById('inv-panel');
const roomDots = document.getElementById('room-dots');
const charDisplay = document.getElementById('char-display');
const attemptsIndicator = document.getElementById('attempts-indicator');
const attemptPips = document.getElementById('attempt-pips');

// ─── Typewriter ───────────────────────────────
function setOutput(html) {
  output.innerHTML = html;
  // Modificación importante: auto-scroll al inicio del terminal
  document.querySelector('.terminal').scrollTop = 0; 
}

// ─── HUD ──────────────────────────────────────
function updateHUD() {
  const radEl = document.getElementById('rad-val');
  const radBar = document.getElementById('rad-bar');
  const presEl = document.getElementById('pres-val');
  const presBar = document.getElementById('pres-bar');

  radEl.textContent = STATE.rad + ' mSv';
  radBar.style.width = Math.min(STATE.rad, 100) + '%';
  radBar.className = 'progress-fill rad';

  if (STATE.rad >= 70) {
    radEl.className = 'hud-value danger';
  } else if (STATE.rad >= 40) {
    radEl.className = 'hud-value warning';
  } else {
    radEl.className = 'hud-value';
  }

  presEl.textContent = STATE.pressure + '%';
  presBar.style.width = Math.min(STATE.pressure, 100) + '%';

  if (STATE.pressure >= 75 || STATE.pressure <= 25) {
    presEl.className = 'hud-value danger';
    presBar.className = 'progress-fill pressure-high';
  } else if (STATE.pressure >= 65 || STATE.pressure <= 35) {
    presEl.className = 'hud-value warning';
    presBar.className = 'progress-fill pressure-high';
  } else {
    presEl.className = 'hud-value';
    presBar.className = 'progress-fill';
  }

  // Inventory
  const invItems = document.getElementById('inv-items');
  if (STATE.inventory.length === 0) {
    invItems.innerHTML = '<span style="color:var(--green-dark)">[ vacío ]</span>';
  } else {
    invItems.innerHTML = STATE.inventory.map(i => `<span class="inv-item">${i}</span>`).join('');
  }

  // Room dots
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('dot-' + i);
    if (!dot) continue;
    dot.className = 'room-dot';
    if (i < STATE.room) dot.classList.add('done');
    if (i === STATE.room) dot.classList.add('active');
  }
}

function showHUD() {
  hud.style.display = 'grid';
  invPanel.style.display = 'block';
  roomDots.style.display = 'flex';
  charDisplay.style.display = 'block';
}

function addRad(amount) {
  const mod = STATE.character ? CHARS[STATE.character].radReduction : 1.0;
  STATE.rad = Math.min(100, Math.round(STATE.rad + amount * mod));
  updateHUD();
  if (STATE.rad >= 100) { triggerGameOver('rad'); }
}

function addPressure(amount) {
  STATE.pressure = Math.min(100, Math.max(0, STATE.pressure + amount));
  updateHUD();
  if (STATE.pressure >= 100 || STATE.pressure <= 0) { triggerGameOver('pressure'); }
}

function addItem(item) {
  if (!STATE.inventory.includes(item)) STATE.inventory.push(item);
  updateHUD();
}


// ─── Attempts ─────────────────────────────────
function resetQuestionAttempts() {
  STATE.questionAttempts = 0;
  attemptsIndicator.className = 'attempts-indicator';
  updateAttemptPips();
}

function updateAttemptPips() {
  let html = '';
  for (let i = 0; i < STATE.maxAttempts; i++) {
    const used = i < STATE.questionAttempts;
    html += `<span class="attempt-pip${used ? ' used' : ''}"></span>`;
  }
  attemptPips.innerHTML = html;
}

function showAttempts() {
  attemptsIndicator.className = 'attempts-indicator visible';
  updateAttemptPips();
}

function hideAttempts() {
  attemptsIndicator.className = 'attempts-indicator';
}

// ─── Choices ─────────────────────────────────
function setChoices(arr) {
  choices.innerHTML = '';
  inputRow.classList.remove('visible');
  arr.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (opt.cls ? ' ' + opt.cls : '');
    btn.innerHTML = opt.label;
    btn.onclick = opt.action;
    choices.appendChild(btn);
  });
}

function clearChoices() { choices.innerHTML = ''; }
function showInput(placeholder) {
  clearChoices();
  resetQuestionAttempts();
  showAttempts();
  inputRow.classList.add('visible');
  userInput.placeholder = placeholder || 'Introduce tu respuesta...';
  userInput.value = '';
  userInput.focus();
}

function setFeedback(type, html) {
  feedback.className = 'feedback-panel ' + type;
  feedback.innerHTML = html;
  // Eliminado el scrollIntoView para no forzar saltos de vista en la ventana estática
}
function clearFeedback() {
  feedback.className = 'feedback-panel';
  feedback.innerHTML = '';
}

  ─────────────────────────────────────────────────────────</span>

`);

function room2CheckAnswer() {
  const val = parseFloat(userInput.value.replace(',','.'));
  clearFeedback();
  if (isNaN(val)) { setFeedback('error', 'Introduce un número válido.'); return; }

  if (Math.abs(val - 4) < 0.05) {
    addItem('Tarjeta de Acceso 7-B');
    inputRow.classList.remove('visible');
    hideAttempts();
    setFeedback('success', `
<span style="color:var(--green)">★ PRESIÓN CORRECTA: 4 atm ★</span><br><br>
<strong>Resolución:</strong><br>
Ley de Boyle-Mariotte (T constante): <strong>P₁·V₁ = P₂·V₂</strong><br>
2 atm × 10 L = P₂ × 5 L<br>
P₂ = 20 / 5 = <strong>4 atm</strong><br><br>
Al reducirse el volumen a la mitad, la presión se dobla. La válvula 7-B se purga con un silbido controlado. 
Has obtenido la <span class="amber-line">Tarjeta de Acceso 7-B</span>.<br><br>
<span class="dim-line">ZVEZDA-1: "Presión normalizada. Pistons estabilizados. Acceso a Sala 3 desbloqueado."</span>
`);
    setTimeout(() => {
      STATE.room = 2;
      updateHUD();
      showRoom3();
    }, 2800);
  } else {
    STATE.attemptsRoom++;
    STATE.questionAttempts++;
    updateAttemptPips();
    const delta = val > 4 ? 12 : 10;
    addPressure(delta);
    addRad(8);

    if (STATE.questionAttempts >= STATE.maxAttempts) {
      inputRow.classList.remove('visible');
      hideAttempts();
      setFeedback('error', `
<span style="color:var(--red)">✖ INTENTOS AGOTADOS — COLECTOR PURGADO DE EMERGENCIA</span><br><br>
Tu respuesta: <strong>${val} atm</strong>.<br><br>
<span style="color:var(--amber)">★ SOLUCIÓN: P₂ = <strong>4 atm</strong><br>
Ley de Boyle-Mariotte (T=cte): P₁·V₁ = P₂·V₂<br>
2 atm × 10 L = P₂ × 5 L → P₂ = 20/5 = <strong>4 atm</strong></span><br><br>
<span class="dim-line">Al reducir el volumen a la mitad, la presión se duplica. ZVEZDA-1 purga manualmente. Avanzando...</span>
`);
      addPressure(10);
      setTimeout(() => { STATE.room = 2; updateHUD(); showRoom3(); }, 3000);
    } else {
      setFeedback('error', `
<span style="color:var(--red)">✖ PRESIÓN INCORRECTA — +${delta}% (Intento ${STATE.questionAttempts}/${STATE.maxAttempts})</span><br><br>
Tu respuesta: <strong>${val} atm</strong>.<br>

<span class="dim-line">Te queda ${STATE.maxAttempts - STATE.questionAttempts} intento(s).</span>
`);
      userInput.value = '';
      userInput.focus();
    }
  }
}

  ─────────────────────────────────────────────────────────
  ■ AJUSTE DE ECUACIONES QUÍMICAS:
